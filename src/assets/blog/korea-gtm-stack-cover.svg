<svg width="1680" height="720" viewBox="0 0 1680 720" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1680" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C1411"/>
      <stop offset="0.5" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#060807"/>
    </linearGradient>
    <radialGradient id="topglow" cx="0.5" cy="0" r="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emglow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1342 360) scale(280)">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coin" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1282 300) rotate(48) scale(340)">
      <stop offset="0" stop-color="#8BF0C8"/>
      <stop offset="0.42" stop-color="#34D399"/>
      <stop offset="1" stop-color="#0A3528"/>
    </radialGradient>
    <linearGradient id="ring" x1="1190" y1="214" x2="1494" y2="506" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C7F9E4"/>
      <stop offset="1" stop-color="#0D5942"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1680" height="720" fill="url(#bg)"/>
  <rect width="1680" height="720" fill="url(#topglow)"/>

  <!-- Faint baseline grid -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <line x1="0" y1="180" x2="1680" y2="180"/>
    <line x1="0" y1="360" x2="1680" y2="360"/>
    <line x1="0" y1="540" x2="1680" y2="540"/>
    <line x1="420" y1="0" x2="420" y2="720"/>
    <line x1="840" y1="0" x2="840" y2="720"/>
    <line x1="1260" y1="0" x2="1260" y2="720"/>
  </g>

  <!-- Faint candlestick research motif -->
  <g opacity="0.06" fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <line x1="140" y1="585" x2="140" y2="665"/><rect x="131" y="600" width="18" height="42" rx="3"/>
    <line x1="204" y1="572" x2="204" y2="642"/><rect x="195" y="585" width="18" height="36" rx="3"/>
    <line x1="268" y1="545" x2="268" y2="630"/><rect x="259" y="560" width="18" height="46" rx="3"/>
    <line x1="332" y1="560" x2="332" y2="625"/><rect x="323" y="575" width="18" height="31" rx="3"/>
    <line x1="396" y1="525" x2="396" y2="615"/><rect x="387" y="540" width="18" height="50" rx="3"/>
    <line x1="460" y1="542" x2="460" y2="606"/><rect x="451" y="555" width="18" height="29" rx="3"/>
    <line x1="524" y1="500" x2="524" y2="588"/><rect x="515" y="515" width="18" height="48" rx="3"/>
    <line x1="588" y1="517" x2="588" y2="583"/><rect x="579" y="530" width="18" height="31" rx="3"/>
    <line x1="652" y1="480" x2="652" y2="566"/><rect x="643" y="495" width="18" height="46" rx="3"/>
    <line x1="716" y1="498" x2="716" y2="558"/><rect x="707" y="510" width="18" height="27" rx="3"/>
    <line x1="780" y1="462" x2="780" y2="546"/><rect x="771" y="476" width="18" height="44" rx="3"/>
  </g>

  <!-- Emerald glow behind medallion -->
  <circle cx="1342" cy="360" r="230" fill="url(#emglow)"/>

  <!-- Medallion -->
  <circle cx="1346" cy="372" r="160" fill="#05140E" opacity="0.85" filter="url(#soft)"/>
  <circle cx="1342" cy="360" r="158" fill="url(#coin)"/>
  <circle cx="1342" cy="360" r="158" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <ellipse cx="1298" cy="300" rx="88" ry="52" fill="#ffffff" opacity="0.16" filter="url(#soft)"/>
  <!-- Funnel / stack glyph -->
  <g fill="#06231A">
    <rect x="1262" y="312" width="160" height="23" rx="11.5"/>
    <rect x="1285" y="350" width="114" height="23" rx="11.5"/>
    <rect x="1308" y="388" width="68" height="23" rx="11.5"/>
  </g>

  <!-- Top-left eyebrow -->
  <rect x="96" y="91" width="26" height="3" fill="#34D399"/>
  <text x="134" y="101" fill="#34D399" font-size="22" font-weight="600" letter-spacing="6">KOREA GO-TO-MARKET</text>

  <!-- Top-right brand mark -->
  <g fill="#34D399">
    <circle cx="1387" cy="86" r="2.6"/><circle cx="1399" cy="86" r="2.6"/>
    <circle cx="1387" cy="98" r="2.6"/><circle cx="1399" cy="98" r="2.6"/>
  </g>
  <text x="1584" y="101" text-anchor="end" fill="#ffffff" fill-opacity="0.88" font-size="25" font-weight="700" letter-spacing="7">ium LABS</text>

  <!-- Title -->
  <text x="92" y="352" fill="#ffffff" font-size="120" font-weight="800" letter-spacing="-3">The Korea</text>
  <text x="92" y="470" fill="#ffffff" font-size="120" font-weight="800" letter-spacing="-3">GTM Stack</text>

  <!-- Subtitle -->
  <text x="98" y="540" fill="#ffffff" fill-opacity="0.55" font-size="30" font-weight="400" letter-spacing="0.4">A full-funnel framework for Web3 market entry.</text>

  <!-- Bottom-left category tag -->
  <rect x="96" y="629" width="18" height="3" fill="#34D399"/>
  <text x="124" y="639" fill="#ffffff" fill-opacity="0.5" font-size="20" font-weight="600" letter-spacing="5">GTM STRATEGY</text>

  <!-- Bottom-right url -->
  <text x="1584" y="639" text-anchor="end" fill="#ffffff" fill-opacity="0.3" font-size="20" font-weight="500" letter-spacing="3">iumlabs.io/blog</text>
</svg>

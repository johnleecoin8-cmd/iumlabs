<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tokenomics allocation chart">
  <defs>
    <radialGradient id="tkbg" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#1B1533"/>
      <stop offset="52%" stop-color="#0C0B12"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </radialGradient>
    <filter id="tkglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#tkbg)"/>

  <!-- faint guide rings -->
  <circle cx="400" cy="400" r="252" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="400" cy="400" r="148" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- allocation donut -->
  <g filter="url(#tkglow)" fill="none" stroke-width="70">
    <circle cx="400" cy="400" r="200" stroke="#818CF8" stroke-dasharray="371 885.64" transform="rotate(-90 400 400)"/>
    <circle cx="400" cy="400" r="200" stroke="#C084FC" stroke-dasharray="270 986.64" transform="rotate(18 400 400)"/>
    <circle cx="400" cy="400" r="200" stroke="#22D3EE" stroke-dasharray="245 1011.64" transform="rotate(97.2 400 400)"/>
    <circle cx="400" cy="400" r="200" stroke="#34D399" stroke-dasharray="195 1061.64" transform="rotate(169.2 400 400)"/>
    <circle cx="400" cy="400" r="200" stroke="#FBBF24" stroke-dasharray="145 1111.64" transform="rotate(226.8 400 400)"/>
  </g>

  <!-- center mark -->
  <circle cx="400" cy="400" r="7" fill="#C084FC" filter="url(#tkglow)"/>
</svg>
